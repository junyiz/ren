<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ren API Proxy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Ren API Proxy</h1>
            <p class="subtitle">Share your LLM API within LAN safely</p>
        </header>

        <main>
            <div class="status-card">
                <div class="status-indicator" id="status-indicator"></div>
                <span id="status-text">Service: Stopped</span>
            </div>

            <div class="form-card">
                <div class="form-group">
                    <label for="provider">Provider</label>
                    <select id="provider">
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="ollama">Ollama (OpenAI compatible)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="api-key">API Key</label>
                    <input type="password" id="api-key" placeholder="sk-...">
                </div>

                <div class="form-group">
                    <label for="upstream-url">Upstream URL</label>
                    <input type="text" id="upstream-url" value="https://api.openai.com">
                    <small>Leave as default for OpenAI, use local URL for Ollama</small>
                </div>

                <div class="form-group">
                    <label for="port">Port</label>
                    <input type="number" id="port" value="8080" min="1024" max="65535">
                </div>

                <div class="button-group">
                    <button id="start-btn" class="btn btn-primary">Start Service</button>
                    <button id="stop-btn" class="btn btn-secondary" disabled>Stop Service</button>
                </div>
            </div>

            <div class="info-card" id="connection-info" style="display: none;">
                <h3>Connection Info</h3>
                <p>Share this with others on your network:</p>
                <code id="proxy-url"></code>
                <p class="hint">Users can connect by setting base_url to this address</p>
            </div>
        </main>

        <footer>
            <p>Your API key never leaves this device</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
